---
# Companion to custom-rhcl-console. Colocated in the plugin's own
# namespace so the whole ecosystem lives together and RBAC/network
# policies scope naturally. If your plugin lives elsewhere, adjust
# metadata.namespace on every object below.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dns-prober
  namespace: custom-rhcl-console
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-prober
  namespace: custom-rhcl-console
  labels:
    app: dns-prober
    app.kubernetes.io/part-of: custom-rhcl-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dns-prober
  template:
    metadata:
      labels:
        app: dns-prober
    spec:
      serviceAccountName: dns-prober
      containers:
        - name: dns-prober
          image: quay.io/hodrigohamalho/custom-rhcl-console:dns-prober-1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
          volumeMounts:
            - name: tls
              mountPath: /etc/dns-prober-tls
              readOnly: true
          readinessProbe:
            httpGet: { path: /q/health/ready, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /q/health/live, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
      volumes:
        # Cert Secret is minted by OpenShift's service-serving-cert
        # operator, triggered by the annotation on the Service below.
        # On a fresh install the Secret takes a few seconds to appear;
        # the pod stays Pending until it lands.
        - name: tls
          secret:
            secretName: dns-prober-tls
---
apiVersion: v1
kind: Service
metadata:
  name: dns-prober
  namespace: custom-rhcl-console
  labels:
    app: dns-prober
  annotations:
    # Ask the service-serving-cert operator for a signed cert. The
    # resulting Secret is mounted into the pod as tls.crt / tls.key,
    # and Quarkus serves HTTPS on 8443 from it. The console plugin
    # proxy (ConsolePlugin.spec.proxy) requires HTTPS on the target
    # Service — this is what makes the /api/proxy/plugin/... path work.
    service.beta.openshift.io/serving-cert-secret-name: dns-prober-tls
spec:
  selector:
    app: dns-prober
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 8443
      targetPort: 8443
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dns-prober
  namespace: custom-rhcl-console
  labels:
    app: dns-prober
spec:
  to:
    kind: Service
    name: dns-prober
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
