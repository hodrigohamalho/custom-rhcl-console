quarkus.application.name=dns-prober
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# HTTPS on 8443 for the OpenShift Console plugin proxy — the
# ConsolePlugin CRD requires the proxied Service to be HTTPS
# ("The Service must use HTTPS."). The cert files come from a
# Secret minted by OpenShift's service-serving-cert operator,
# mounted at /etc/dns-prober-tls in the pod. Plaintext 8080 stays
# on so the edge-terminated Route and the /q/health probes keep
# working without TLS.
quarkus.http.ssl-port=8443
quarkus.http.ssl.certificate.files=/etc/dns-prober-tls/tls.crt
quarkus.http.ssl.certificate.key-files=/etc/dns-prober-tls/tls.key
quarkus.http.insecure-requests=enabled

# The plugin runs in the OpenShift Console origin, we run wherever the
# operator exposes us via a Route. Allow any origin at the JAX-RS layer
# too (the resource-level headers cover the actual probe endpoint;
# these tell Quarkus not to reject preflight OPTIONS at the framework
# level).
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=content-type,accept,authorization

quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true

quarkus.log.category."org.xbill.DNS".level=WARN
